name: Publish to PyPI

# Trusted Publisher (OIDC, no stored secrets) + PEP 740 attestations.
# Fires on a signed v* tag (the existing release flow). The publish job runs in
# the `release` environment, which should carry a required-reviewer founder gate
# so a tag alone cannot push to PyPI without an explicit approval.
#
# PyPI setup (once, before the first real release): register a Trusted Publisher
# (or a pending publisher for a not-yet-existing project) matching exactly —
#   repository:  presidio-v/presidio-hardened-ikigov-assess
#   workflow:    publish.yml
#   environment: release
# See pypi-reserve/README.md for the full reservation + launch runbook.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for GitHub build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Generate SBOM
        run: |
          python -m pip install --upgrade cyclonedx-bom
          python -m pip install dist/*.whl
          cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            dist/
            sbom.cdx.json

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing + sigstore
      attestations: write # PEP 740 provenance attestations
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: .
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

  release-assets:
    name: Attach release assets
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: .
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* sbom.cdx.json --repo "$GH_REPO" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* sbom.cdx.json \
              --repo "$GH_REPO" \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "Release $GITHUB_REF_NAME"
          fi
