name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          # Upgrade the build toolchain so the CI environment does not ship
          # known-vulnerable setuptools/wheel (CVE-2024-6345, PYSEC-2025-49,
          # CVE-2026-24049). pip resolves dependencies from the locked tree.
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff format --check .
          ruff check .

      - name: Run tests with coverage
        run: |
          pytest --cov=src/presidio_ikigov_assess --cov-report=xml --cov-fail-under=80

      - name: Upload coverage report
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
        continue-on-error: true
