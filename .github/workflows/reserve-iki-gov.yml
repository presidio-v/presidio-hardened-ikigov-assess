name: Reserve iki-gov (PyPI alias)

# One-shot Trusted-Publishing upload of the metadata-only `iki-gov` placeholder
# (pypi-reserve/iki-gov) to claim the short alias on PyPI. Manual trigger only;
# reuses the founder-gated `release` environment. No stored secrets.
#
# PyPI pending publisher must match exactly:
#   project:     iki-gov
#   repository:  presidio-v/presidio-hardened-ikigov-assess
#   workflow:    reserve-iki-gov.yml
#   environment: release
#
# This workflow can be deleted once the name is reserved (it ships nothing).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish iki-gov (Trusted Publishing)
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing + sigstore
      attestations: write # PEP 740 provenance attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build placeholder
        run: |
          python -m pip install --upgrade pip build
          python -m build pypi-reserve/iki-gov
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: pypi-reserve/iki-gov/dist
          attestations: true
